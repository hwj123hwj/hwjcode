appId: com.bot.easycode.desktop
productName: Easy Code
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
# Ship the agent backend the desktop spawns (`easycode --acp`). Built at the
# repo root with `npm run bundle`; copied into the app under resources/backend.
extraResources:
  - from: ../../bundle
    to: backend
    filter:
      - '**/*'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  # universal = 同时支持 Apple Silicon (arm64) 与 Intel (x64)。
  # 可行性前提（已确认）：本应用无 .node 原生模块，agent 为纯 JS bundle；
  # 内置的 @vscode/ripgrep 自带全平台二进制并在运行时按 process.arch 动态选取
  # （Intel 上用 darwin-x64-rg，arm64 上用 darwin-arm64-rg），故 universal 包
  # 在两种架构上都能正常工作。
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  # @vscode/ripgrep 在 backend 里自带全平台二进制（darwin-arm64-rg / darwin-x64-rg
  # 等），这些文件在 x64 与 arm64 子构建中字节相同，@electron/universal 合并时会
  # 因「相同但属单架构二进制」而报错。x64ArchFiles 告诉合并器：这些文件原样保留、
  # 不做 lipo。运行时 @vscode/ripgrep 会按 process.arch 自行选取对应二进制。
  x64ArchFiles: "**/@vscode/ripgrep/bin/*"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # 自 electron-builder v24.0.0+ 引入，支持基于内置 notarytool 自动进行公证。
  # notarize: true 表示走环境变量自动模式，需在环境变量中提供：
  #   APPLE_ID                     —— 开发者账号邮箱
  #   APPLE_APP_SPECIFIC_PASSWORD  —— App 专用密码（注意变量名，不是 APPLE_ID_PASSWORD）
  #   APPLE_TEAM_ID                —— 团队 ID
  # 当未提供这些环境变量时，公证步骤会自动跳过，保证未配置公证的普通本地构建也能完成。
  notarize: true
win:
  # electron-builder converts this PNG (>=256x256) into a multi-size .ico used
  # for the .exe and, by default, the NSIS installer/uninstaller too.
  icon: build/icon.png
  target:
    - nsis
  # No spaces + a build timestamp so successive installers don't collide.
  # BUILD_TIME (YYYYMMDDHHMM) is injected by scripts/pack-installer.cjs.
  artifactName: EasyCode-v${version}-${env.BUILD_TIME}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # installerIcon / uninstallerIcon are intentionally omitted: electron-builder
  # defaults them to the application icon generated from `win.icon` above.
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
