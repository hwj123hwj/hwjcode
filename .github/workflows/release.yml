name: Build and Release

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则使用 package.json 中的版本)'
        required: false
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false
      draft:
        description: '是否创建草稿 Release'
        required: false
        type: boolean
        default: false

  # 当推送 tag 时自动触发
  push:
    tags:
      - 'v*.*.*'

# 设置权限
permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Node.js 环境
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.3'
          cache: 'npm'

      # 3. 安装依赖
      - name: 📦 Install dependencies
        run: npm install

      # 3.1 构建 Webview (VSCode 插件 UI)
      - name: 🌐 Build Webview
        run: npm run build:webview --workspace=packages/vscode-ui-plugin

      # 4. 获取并同步版本号
      - name: 📌 Get and Sync version
        id: get_version
        run: |
          # 1. 确定版本号
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi

          # 去除可能存在的首字母 v (例如 inputs.version 输入了 v1.1.4 或 package.json 中带有 v)
          VERSION="${VERSION#v}"

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Final target version: $VERSION"

          # 2. 同步版本号到所有 package.json (仅在 runner 环境中，不提交回仓库)
          node -e "
            const fs = require('fs');
            const paths = [
              'package.json',
              'packages/cli/package.json',
              'packages/cli/src/package.json',
              'packages/core/package.json',
              'packages/vscode-ide-companion/package.json'
            ];
            paths.forEach(p => {
              if (fs.existsSync(p)) {
                const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                const oldVersion = pkg.version;
                pkg.version = '$VERSION';
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
                console.log('✅ Updated ' + p + ': ' + oldVersion + ' -> $VERSION');
              }
            });
          "

      # 5. 构建跨平台包（由于已经同步了版本号，这里使用 --no-version-bump）
      - name: 🏗️ Build cross-platform package
        run: npm run pack:prod:ci
        env:
          NODE_ENV: production

      # 6. 查找构建产物
      - name: 🔍 Find build artifacts
        id: find_artifacts
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TGZ_FILE="hwjcode-${VERSION}.tgz"

          if [ ! -f "$TGZ_FILE" ]; then
            echo "❌ Expected artifact not found: $TGZ_FILE"
            echo "📁 Available .tgz files:"
            ls -lh hwjcode-*.tgz 2>/dev/null || echo "  (none)"
            exit 1
          fi

          echo "TGZ_FILE=$TGZ_FILE" >> $GITHUB_OUTPUT
          echo "✅ Found artifact: $TGZ_FILE"
          ls -lh $TGZ_FILE

      # 6.1 发布到 npm (跳过 prepare 因为构建产物已就绪; 已发布过则跳过)
      - name: 📤 Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          export SKIP_PREPARE=1
          npm publish 2>&1 | tee /tmp/npm_publish.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            if grep -q "previously published" /tmp/npm_publish.log; then
              echo "⚠️ Version already published on npm, skipping."
            else
              echo "❌ npm publish failed with unexpected error"
              exit $rc
            fi
          fi
          rm -f .npmrc /tmp/npm_publish.log
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 7. 创建 GitHub Release (使用 tag message 作为 release notes)
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: hwjcode v${{ steps.get_version.outputs.VERSION }}
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ inputs.prerelease || false }}
          files: ${{ steps.find_artifacts.outputs.TGZ_FILE }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. 上传构建产物为 workflow artifact
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easycode-ai-v${{ steps.get_version.outputs.VERSION }}
          path: ${{ steps.find_artifacts.outputs.TGZ_FILE }}
          retention-days: 90
