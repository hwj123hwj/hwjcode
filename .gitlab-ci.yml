stages:
  - test-build
  - release
  - release-vscode
  - release-desktop

# 只在符合 cli-release-vx.x.x 或 vscode-release-vx.x.x 或 desktop-win-release-vx.x.x
# 或 test-all-vx.x.x 的 tag 时触发
workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^cli-release-v\d+\.\d+\.\d+$/'
    - if: '$CI_COMMIT_TAG =~ /^vscode-release-v\d+\.\d+\.\d+$/'
    - if: '$CI_COMMIT_TAG =~ /^desktop-win-release-v\d+\.\d+\.\d+$/'
    - if: '$CI_COMMIT_TAG =~ /^test-all-v\d+\.\d+\.\d+$/'

# 全局 npm 缓存配置
cache:
  key:
    files:
      # 根据锁文件变化决定缓存重建
      - package-lock.json
      - packages/vscode-ui-plugin/package-lock.json
  paths:
    # 缓存目录：根 node_modules、子包和 npm 缓存
    - node_modules/
    - packages/*/node_modules/
    - packages/vscode-ui-plugin/webview/node_modules/
    - .npm/
  policy: pull-push

test-build:
  stage: test-build
  tags:
    - deepvcode-docker-runner
  image: node:20
  variables:
    GIT_DEPTH: 1
  script:
    # 配置 npm 缓存目录（写入到项目 .npm）
    - npm config set cache /cache/.npm --global
    # 安装依赖（禁用 prepare 钩子，避免重复构建）
    - SKIP_PREPARE=1 npm ci --retry=10 --retry-delay=5000 --prefer-offline
    # 仅构建，不发布
    - npm run build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^test-all-v\d+\.\d+\.\d+$/'

release:
  stage: release
  tags:
    - deepvcode-docker-runner     # ✅ 必须匹配 config.toml 的 name 或 tag
  image: node:20
  variables:
    GIT_DEPTH: 1
  before_script:
    - rm -f .npmrc || true
  script:
    # 配置 npm 缓存目录（写入到项目 .npm）
    - npm config set cache /cache/.npm --global
    # 安装依赖（禁用 prepare 钩子，避免重复构建）
    - SKIP_PREPARE=1 npm ci --retry=10 --retry-delay=5000 --prefer-offline
    # 提取版本号
    - export NEW_VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^cli-release-v//')
    # 更新版本号
    - npm version "$NEW_VERSION" --no-git-tag-version --force
    # 发布到 npm（设置 SKIP_PREPARE=1 让 prepare 钩子也跳过）
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - export SKIP_PREPARE=1
    - npm publish
  after_script:
    - rm -f .npmrc || true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^cli-release-v\d+\.\d+\.\d+$/'

release-vscode:
  stage: release-vscode
  tags:
    - deepvcode-docker-runner     # ✅ 与上保持一致
  image: node:20
  variables:
    GIT_DEPTH: 1
  script:
    - npm config set cache /cache/.npm --global
    - SKIP_PREPARE=1 npm ci --retry=10 --retry-delay=5000 --prefer-offline
    - export NEW_VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^vscode-release-v//')
    # Build core package (required dependency for vscode-ui-plugin)
    - npm run build --workspace=packages/core
    - cd packages/vscode-ui-plugin
    - npm version "$NEW_VERSION" --no-git-tag-version --force
    - npm run build:prod
    # 发布到 VSCode Marketplace（版本已存在时打印警告并继续）
    - |
      if npx @vscode/vsce publish -p "${VSCE_TOKEN}" 2>&1 | tee /tmp/vsce_output.log; then
        echo "✅ Successfully published to VSCode Marketplace"
      else
        if grep -q "already exists" /tmp/vsce_output.log; then
          echo "⚠️ WARNING: Version already exists on VSCode Marketplace, skipping..."
        else
          echo "❌ Failed to publish to VSCode Marketplace"
          exit 1
        fi
      fi
    - npx @vscode/vsce package -o ../../deepv-code-vscode-"$NEW_VERSION".vsix
    # 发布到 Open VSX（版本已存在时打印警告并继续）
    - |
      if npx ovsx publish -p "${OVSX_TOKEN}" --packagePath ../../deepv-code-vscode-"$NEW_VERSION".vsix 2>&1 | tee /tmp/ovsx_output.log; then
        echo "✅ Successfully published to Open VSX"
      else
        if grep -q "already exists" /tmp/ovsx_output.log; then
          echo "⚠️ WARNING: Version already exists on Open VSX, skipping..."
        else
          echo "❌ Failed to publish to Open VSX"
          exit 1
        fi
      fi
  artifacts:
    paths:
      - "*.vsix"
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG =~ /^vscode-release-v\d+\.\d+\.\d+$/'

release-desktop-win:
  stage: release-desktop
  # 宿主机原生 shell executor（非 docker）：electron-builder 打 Windows exe 需要
  # 真实 Windows 文件系统 + （证书到货后）signtool，Linux 容器打不出来。
  tags:
    - deepvcode-windows-shell-runner
  variables:
    GIT_DEPTH: 1
  script:
    - npm ci --retry=10 --retry-delay=5000 --prefer-offline
    - $env:NEW_VERSION = $CI_COMMIT_TAG -replace '^desktop-win-release-v', ''
    # 与 pack-installer.cjs 的 buildStamp() 格式一致（YYYYMMDDHHMM），提前算好
    # 并传给它复用，这样产物文件名在打包前就已知，无需事后搜索。
    - $env:BUILD_TIME = Get-Date -Format "yyyyMMddHHmm"
    - npm run bundle
    - cd packages/desktop
    # npm version 在版本号未变化时会报错退出（Version not changed）——用
    # npm pkg set 代替，同版本重跑（例如重试同一个 tag）也不会失败。
    - npm pkg set version="$env:NEW_VERSION"
    - npm run pack:win
    - $exePath = "release\$env:NEW_VERSION\EasyCode-v$env:NEW_VERSION-$env:BUILD_TIME.exe"
    - $absExePath = (Resolve-Path $exePath).Path
    - Write-Host "Uploading $absExePath to GCS"
    # gcs.exe 跑成本机 HTTP 服务（127.0.0.1:4278），上传就是一次 JSON POST——
    # 不依赖 gcs 自己的本地配置文件，绕开了 SYSTEM 服务账户读不到用户级
    # gcs config 的问题。用 Invoke-RestMethod（不是 curl 别名 Invoke-WebRequest）
    # 因为 PowerShell 5.1 的 curl 参数不兼容真正的 curl。
    - |
      $body = @{ file_path = $absExePath; name = "EasyCode-v$env:NEW_VERSION-win.exe" } | ConvertTo-Json
      $result = Invoke-RestMethod -Uri "http://127.0.0.1:4278/upload" -Method Post -ContentType "application/json" -Body $body
      Write-Host "Uploaded: $($result | ConvertTo-Json -Compress)"
      if (-not $result.ok) { throw "gcs upload failed" }
  artifacts:
    paths:
      - packages/desktop/release/**/*.exe
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG =~ /^desktop-win-release-v\d+\.\d+\.\d+$/'
